name: 📊 Daily Report

on:
  schedule:
    - cron: '0 8 * * *'      # 8:00 AM UTC daily
  workflow_dispatch:

concurrency:
  group: daily-report
  cancel-in-progress: false

jobs:
  run:
    name: Daily Analytics & Health Check
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --omit=dev

      - name: Run Daily Report
        run: node scripts/run-agent.js daily-report
        env:
          NODE_ENV: production
          AI_PROVIDER:              ${{ secrets.AI_PROVIDER }}
          ANTHROPIC_API_KEY:        ${{ secrets.ANTHROPIC_API_KEY }}
          GROK_API_KEY:             ${{ secrets.GROK_API_KEY }}
          GROK_MODEL:               ${{ secrets.GROK_MODEL }}
          CLAUDE_MODEL:             ${{ secrets.CLAUDE_MODEL }}
          SHOPIFY_SHOP_NAME:        ${{ secrets.SHOPIFY_SHOP_NAME }}
          SHOPIFY_ACCESS_TOKEN:     ${{ secrets.SHOPIFY_ACCESS_TOKEN }}
          SHOPIFY_CLIENT_ID:        ${{ secrets.SHOPIFY_CLIENT_ID }}
          SHOPIFY_CLIENT_SECRET:    ${{ secrets.SHOPIFY_CLIENT_SECRET }}
          SLACK_WEBHOOK_URL:        ${{ secrets.SLACK_WEBHOOK_URL }}
