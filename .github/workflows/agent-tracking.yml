name: 🚢 Tracking Updates

on:
  schedule:
    - cron: '0 */2 * * *'    # every 2 hours
  workflow_dispatch:

concurrency:
  group: tracking-agent
  cancel-in-progress: false

jobs:
  run:
    name: Update Order Tracking
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --omit=dev

      - name: Run Tracking Agent
        run: node scripts/run-agent.js tracking
        env:
          NODE_ENV: production
          AI_PROVIDER:              ${{ secrets.AI_PROVIDER }}
          ANTHROPIC_API_KEY:        ${{ secrets.ANTHROPIC_API_KEY }}
          GROK_API_KEY:             ${{ secrets.GROK_API_KEY }}
          GROK_MODEL:               ${{ secrets.GROK_MODEL }}
          CLAUDE_MODEL:             ${{ secrets.CLAUDE_MODEL }}
          SHOPIFY_SHOP_NAME:        ${{ secrets.SHOPIFY_SHOP_NAME }}
          SHOPIFY_ACCESS_TOKEN:     ${{ secrets.SHOPIFY_ACCESS_TOKEN }}
          SHOPIFY_CLIENT_ID:        ${{ secrets.SHOPIFY_CLIENT_ID }}
          SHOPIFY_CLIENT_SECRET:    ${{ secrets.SHOPIFY_CLIENT_SECRET }}
          ALIEXPRESS_APP_KEY:       ${{ secrets.ALIEXPRESS_APP_KEY }}
          ALIEXPRESS_APP_SECRET:    ${{ secrets.ALIEXPRESS_APP_SECRET }}
          CJ_API_KEY:               ${{ secrets.CJ_API_KEY }}
          CJ_EMAIL:                 ${{ secrets.CJ_EMAIL }}
          SLACK_WEBHOOK_URL:        ${{ secrets.SLACK_WEBHOOK_URL }}
